name: Update VPN Servers

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Fetch, check, and format servers
        run: python update_servers.py "wi-fi(black).txt" "wi-fi(black)prem.txt" "lte(white).txt" "lte(white)prem.txt"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update servers [skip ci]"
          file_pattern: "wi-fi(black).txt wi-fi(black)prem.txt lte(white).txt lte(white)prem.txt"
