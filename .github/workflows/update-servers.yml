name: Update VPN Servers

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Fetch, check, and format servers
        run: python update_servers.py "wi-fi(black).txt" "wi-fi(black)prem.txt" "lte(white).txt" "lte(white)prem.txt"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update servers [skip ci]"
          file_pattern: "wi-fi(black).txt wi-fi(black)prem.txt lte(white).txt lte(white)prem.txt"

      - name: Restart Xray via 3x-ui API
        env:
          XUI_USER: ${{ secrets.XUI_USERNAME }}
          XUI_PASS: ${{ secrets.XUI_PASSWORD }}
        run: |
          BASE="http://31.76.103.96:25756/ZOdir6m5l3SQhqCu"
          COOKIE=$(mktemp)
          PAGE=$(curl -s -c "$COOKIE" "$BASE/")
          CSRF1=$(echo "$PAGE" | grep -oP 'name="csrf-token" content="\K[^"]+')
          curl -s -c "$COOKIE" -b "$COOKIE" -H "X-CSRF-Token: $CSRF1" \
            --data-urlencode "username=$XUI_USER" \
            --data-urlencode "password=$XUI_PASS" \
            "$BASE/login" > /dev/null
          PAGE2=$(curl -s -b "$COOKIE" -L "$BASE/")
          CSRF2=$(echo "$PAGE2" | grep -oP 'name="csrf-token" content="\K[^"]+')
          curl -s -b "$COOKIE" -H "X-CSRF-Token: $CSRF2" \
            -X POST "$BASE/panel/api/server/restartXrayService"
          rm -f "$COOKIE"
